name: system-autocommit
description: "Git credential seeding + graceful agent-authored commit/push during a task session"
system: true

session:
  skills:
    - skills/twinkle-git/SKILL.md
  hooks:
    SessionStart:
      - name: "Seed git credentials from GITHUB_TOKEN"
        command: |
          if [[ -z "${GITHUB_TOKEN:-}" ]]; then
            echo "[twinkle-flows] GITHUB_TOKEN not set; skipping git auth." >&2
            exit 0
          fi
          git config --global credential.helper '!f() { echo "username=x-access-token"; echo "password=${GITHUB_TOKEN}"; }; f'
          git config --global url."https://github.com/".insteadOf "git@github.com:" 2>/dev/null || true
          echo "git auth ready"
